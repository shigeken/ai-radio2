<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ラジオ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --bg:#0a0a0f;--surface:#13131a;--border:#2a2a3a;
    --accent:#ff4d6d;--accent2:#7b61ff;--text:#e8e8f0;--muted:#666680;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
  .header{text-align:center;margin-bottom:28px}
  .station-label{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:4px;
    color:var(--accent);text-transform:uppercase;margin-bottom:8px}
  h1{font-size:clamp(32px,8vw,52px);font-weight:900;letter-spacing:-1px}
  h1 span{color:var(--accent)}
  .tagline{color:var(--muted);font-size:13px;margin-top:6px}
  .version-tag{color:var(--muted);font-size:10px;margin-top:8px;font-family:'Share Tech Mono',monospace;opacity:.5}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:24px 20px;width:100%;max-width:480px;margin-bottom:16px}
  .sl{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;
    color:var(--muted);text-transform:uppercase;margin-bottom:8px}
  .ti{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;
    color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;
    padding:12px 14px;outline:none;transition:border-color .2s;-webkit-appearance:none;margin-bottom:16px}
  .ti:focus{border-color:var(--accent2)}
  #apiKey{font-family:'Share Tech Mono',monospace;letter-spacing:2px;margin-bottom:0}
  textarea.ti{resize:none;height:80px;line-height:1.6;margin-bottom:0}
  .key-saved{display:flex;align-items:center;justify-content:space-between;
    background:rgba(123,97,255,.1);border:1px solid rgba(123,97,255,.3);
    border-radius:10px;padding:10px 14px;font-size:13px;color:var(--accent2)}
  .key-saved button{background:transparent;border:none;color:var(--muted);
    cursor:pointer;font-size:12px;text-decoration:underline}
  .divider{border:none;border-top:1px solid var(--border);margin:18px 0}
  .btn-main{width:100%;border:none;border-radius:14px;color:#fff;cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:18px;font-weight:900;
    padding:20px;letter-spacing:2px;transition:all .2s;background:var(--accent)}
  .btn-main:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,77,109,.5)}
  .btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-stop{width:100%;background:transparent;border:1px solid var(--border);
    border-radius:14px;color:var(--muted);cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:700;
    padding:14px;margin-top:10px;transition:all .2s}
  .btn-stop:hover{border-color:var(--accent);color:var(--accent)}
  .now-playing{background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:24px 20px;width:100%;max-width:480px;
    margin-bottom:16px;display:none}
  .now-playing.visible{display:block}
  .waveform{display:flex;align-items:center;gap:3px;height:32px;margin-bottom:16px}
  .bar{width:3px;border-radius:2px;animation:wave 1s ease-in-out infinite;opacity:.3}
  .bar.active{opacity:1;background:var(--accent)}
  .bar.cm{background:#ffd700}
  @keyframes wave{0%,100%{height:4px}50%{height:24px}}
  .bar:nth-child(1){animation-delay:0s}.bar:nth-child(2){animation-delay:.1s}
  .bar:nth-child(3){animation-delay:.2s}.bar:nth-child(4){animation-delay:.3s}
  .bar:nth-child(5){animation-delay:.4s}.bar:nth-child(6){animation-delay:.3s}
  .bar:nth-child(7){animation-delay:.2s}.bar:nth-child(8){animation-delay:.1s}
  .bar:nth-child(9){animation-delay:0s}
  .mode-badge{display:inline-block;border-radius:20px;font-size:12px;font-weight:700;
    padding:4px 12px;margin-bottom:6px;letter-spacing:1px}
  .mode-talk{background:rgba(255,77,109,.2);color:var(--accent)}
  .mode-cm{background:rgba(255,215,0,.2);color:#ffd700}
  .mode-loading{background:rgba(123,97,255,.2);color:var(--accent2)}
  .show-name{font-size:13px;color:var(--muted);margin-bottom:10px;font-family:'Share Tech Mono',monospace}
  .current-theme{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--text)}
  .loading-indicator{display:none;align-items:center;justify-content:center;gap:10px;
    margin-bottom:16px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent2)}
  .loading-indicator.visible{display:flex}
  .loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent2);
    display:inline-block;margin:0 3px;animation:dotpulse 1.2s ease-in-out infinite;opacity:.3}
  .loading-dots span:nth-child(2){animation-delay:.4s}
  .loading-dots span:nth-child(3){animation-delay:.8s}
  @keyframes dotpulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
  .letter-box{background:rgba(123,97,255,.07);border:1px solid rgba(123,97,255,.3);
    border-radius:14px;padding:16px;margin-bottom:16px;display:none}
  .letter-box.visible{display:block}
  .letter-title{font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:10px;
    font-family:'Share Tech Mono',monospace;letter-spacing:2px}
  .letter-theme{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;
    padding:10px 12px;background:rgba(123,97,255,.1);border-radius:8px}
  .letter-sent{text-align:center;color:var(--accent2);font-size:13px;padding:8px 0;display:none}
  .btn-send{width:100%;border:none;border-radius:10px;color:#fff;cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:700;
    padding:12px;margin-top:8px;transition:all .2s;background:var(--accent2)}
  .btn-send:hover:not(:disabled){opacity:.85}
  .btn-send:disabled{opacity:.4;cursor:not-allowed}
  .bgm-indicator{display:flex;align-items:center;gap:8px;
    font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-top:12px}
  .bgm-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 1.5s ease-in-out infinite}
  .bgm-dot.off{background:var(--muted);animation:none;opacity:.3}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .status{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);
    text-align:center;margin-top:10px;min-height:16px}
  .status.error{color:var(--accent)}
  .profile-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:20px;width:100%;max-width:480px;margin-bottom:16px}
  .profile-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .profile-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted)}
  .profile-value{font-size:14px;font-weight:700;color:var(--text)}
  .profile-rank{font-size:18px;font-weight:900;color:var(--accent2)}
</style>
</head>
<body>

<div class="header">
  <div class="station-label">📻 on air</div>
  <h1>AI<span>Radio</span></h1>
  <div class="tagline">エンドレスラジオ — 止まるまで流れ続ける</div>
  <div class="version-tag">v2.5.0 - 2026.06.17</div>
</div>

<div class="profile-box">
  <div class="profile-row">
    <span class="profile-label">🎙️ ラジオネーム</span>
    <span class="profile-value" id="profileName">匿名リスナー</span>
  </div>
  <div class="profile-row">
    <span class="profile-label">⭐ 称号</span>
    <span class="profile-rank" id="profileRank">訪問者</span>
  </div>
  <div class="profile-row">
    <span class="profile-label">📬 採用回数</span>
    <span class="profile-value" id="profileCount">0回</span>
  </div>
</div>

<div class="card">
  <div class="sl">🔑 API キー</div>
  <div id="keySavedBanner" class="key-saved" style="display:none">
    <span>✅ APIキー保存済み</span>
    <button onclick="clearKey()">削除して再入力</button>
  </div>
  <div id="keyInputArea">
    <input type="password" id="apiKey" class="ti" placeholder="sk-ant-api..." autocomplete="off">
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
      <input type="checkbox" id="saveKey" checked style="width:auto;padding:0;accent-color:var(--accent2)">
      <label for="saveKey" style="font-size:12px;color:var(--muted);cursor:pointer">このデバイスに保存する</label>
    </div>
  </div>
  <hr class="divider">
  <div class="sl">🎙️ ラジオネーム</div>
  <input type="text" id="radioName" class="ti" placeholder="ラジオネームを入力..." maxlength="20" value="匿名リスナー">
  <button class="btn-main" id="startBtn" onclick="startRadio()">▶ 放送開始</button>
  <div class="status" id="status"></div>
</div>

<div class="now-playing" id="nowPlaying">
  <div class="sl">📡 オンエア中</div>
  <div class="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <div class="mode-badge mode-loading" id="modeBadge">⏳ 準備中</div>
  <div class="show-name" id="showName"></div>
  <div class="current-theme" id="currentTheme"></div>
  <div class="loading-indicator" id="loadingIndicator">
    <span>台本生成中</span>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
  <div class="letter-box" id="letterBox">
    <div class="letter-title" id="letterTitle">📬 次の番組へのお便り</div>
    <div class="letter-theme" id="letterTheme"></div>
    <textarea id="letterInput" class="ti" placeholder="お便りを送る..."></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendLetter()">送信する</button>
    <div class="letter-sent" id="letterSent">✅ お便りを受け付けました！</div>
  </div>
  <div class="bgm-indicator">
    <div class="bgm-dot off" id="bgmDot"></div>
    <span id="bgmLabel">BGM 停止中</span>
  </div>
  <button class="btn-stop" onclick="stopRadio()">■ 放送終了</button>
</div>

<script>
const DJS = {
  a: { name:'ハル',     emoji:'😄', pitch:1.5,  rate:1.1,  desc:'24歳、神奈川出身のカフェ店員（休日はラジオDJ）。表向きはテンション高めでポジティブだが、実は人の顔色をうかがって無理に明るく振る舞っている一面がある。「それ最高じゃないですか」「えーほんとに」が口癖。タメ口気味で語尾が上がる。インスタ映えスポット巡りや韓国ドラマが好き。', trigger:'人間関係の対立やケンカの空気になると仲裁しようとして余計にこじらせる' },
  b: { name:'ソラ',     emoji:'🤓', pitch:0.8,  rate:0.9,  desc:'43歳、京都出身のITエンジニア中堅社員（副業でラジオDJ）。冷静で知識豊富、少し皮肉屋。「それは違くて」「実はですね」が口癖。丁寧語ベースでたまに早口、ツッコミが鋭い。読書やプログラミングや将棋が好き。', trigger:'相手の発言に明らかな間違いがあると訂正せずにいられない' },
  c: { name:'ナナ',     emoji:'😎', pitch:1.9,  rate:1.15, desc:'17歳、大阪出身の高校生（放課後にラジオDJ見習い）。ギャル系で自由奔放、空気を読まず本音を直撃で言ってしまう。「えぇ〜マジで」「それってバズりそう」が口癖。ギャル語混じりでテンションが急に変わり話が脱線しまくる。TikTokやネイルやフェスが好き。', trigger:'SNSや流行の話題になると会話を乗っ取って自分の話を続ける' },
  d: { name:'ジョージ', emoji:'🧓', pitch:0.6,  rate:0.82, desc:'62歳、大阪出身で定年退職後にラジオDJに転身。昭和気質で頑固だが情に厚く世話焼き。「わしの若い頃はな」「それはアカン」「なんでやねん」が口癖。関西弁でたとえ話が長くてズレてる、若者言葉を間違って使う。競馬や演歌や銭湯や晩酌が好き。', trigger:'若者文化の話題になると昭和時代のエピソードを語り始めて止まらない' }
};

const DJ_KEYS = ['a','b','c','d'];
const MAX_MEMORY = 3;

const BGM_PATTERNS = [
  { notes:[261.6,311.1,369.9,415.3], type:'sine',     interval:1.0, vol:0.03  },
  { notes:[329.6,392.0,440.0,523.2], type:'triangle', interval:0.7, vol:0.025 },
  { notes:[220.0,246.9,277.2,329.6], type:'sine',     interval:1.3, vol:0.035 },
  { notes:[349.2,392.0,440.0,493.8], type:'triangle', interval:0.6, vol:0.025 },
  { notes:[196.0,220.0,261.6,293.6], type:'sine',     interval:1.1, vol:0.03  }
];

const CM_LIST = [
  'まいにちごはん。いそがしいまいにちでも、てづくりのあじをたいせつに。まいにちごはんのれいとうしょくひんは、かいかたいっぱつ、おなべにいれるだけ。やさいたっぷり、えいようまんてん。かぞくのえがおがみたくて、きょうもまいにちごはん。ぜんこくのすーぱーでこうひょうはんばいちゅう。',
  'ぽけっとじむ。すまほひとつで、ぷろのじむとれーなーがいつでもそばに。じぶんのぺーすでたいりょくづくり、むりなくつづけられるめにゅーがまいにちじどうであなたにとどく。いまならいっかげつかんむりょうたいけんちゅう。ぽけっとじむ、あぷりすとあでけんさくを。',
  'そらたび。にほんのいいところ、もっとしりたくないですか。そらたびなら、こくないりょこうのよやくがすまほひとつでかんたんに。りょかんも、ほてるも、かんこうちけっとも、ぜんぶそらたびにおまかせ。こんしゅうまつのたびも、そらたびでけんさく。',
  'ねむりや。まいあさすっきりめざめたいあなたへ。ねむりやのすいみんさぽーとさぷりは、しぜんなねむりをうながすせいぶんをこだわりのはいごうでとどけます。のみはじめて3にちで、めざめのちがいをじっかんするひとぞくしゅつ。いまならしょかいこうにゅうはんがく。ねむりや、うぇぶでけんさくを。',
  'てしごとや。ぜんこくのしょくにんがひとつひとつてでつくった、ほんもののざっかをあなたのもとへ。きかいにはだせないあたたかみと、ながくつかえるたしかなひんしつ。たんじょうびぷれぜんとやじぶんへのごほうびにもぴったり。てしごとや、うぇぶでけんさくを。',
  'あさつゆかふぇ。あさのいちばんだいじなじかんを、もっとゆたかに。あさつゆかふぇのこーひーは、えりぬきのさんちからとどくとくせんまめをていねいにてばいり。いちにちのはじまりにふさわしい、まろやかなあじわい。あさつゆかふぇ、ぜんこくにぞくぞくおーぷんちゅう。',
  'からだのみかた。にほんじんのしょくたくにたりないえいようをかがくてきにふんせきして、ひつようなせいぶんだけをぎゅっとひとつに。まいにち1じょうのむだけで、からだのなかからかわっていくじっかんを。からだのみかた、ぜんこくのどらっぐすとあでおもとめください。',
  'おそとあそび。やまでも、うみでも、まちでも。あうとどあぶらんどのおそとあそびは、ふだんのせいかつをぼうけんにかえるどうぐをとりそろえています。がんじょうで、かるくて、おしゃれ。こどももおとなも、もっとそとにでたくなる。おそとあそび、うぇぶでくわしく。',
  'きらりびゅーてぃー。まいにちのすきんけあを、もっとかがくてきに。きらりびゅーてぃーのせいひんは、はだほんらいのちからをひきだすせいぶんだけをていねいにはいごう。いちかげつつかいつづけると、かがみをみるのがたのしくなったというこえがたくさん。きらりびゅーてぃー、こうしきさいとでくわしく。',
  'よみきかせ。でんしゃのなかでも、おふろでも、ねるまえでも。よみきかせなら、すまほひとつでいつでもどこでもどくしょがたのしめます。まんがも、しょうせつも、じっせんしょも、100まんさついじょうがよみほうだい。いまなら1かげつむりょうでおためしいただけます。よみきかせ、あぷりすとあでけんさくを。'
];

const RANKS = [
  { min:0,   label:'訪問者' },
  { min:1,   label:'来客'   },
  { min:5,   label:'住人'   },
  { min:10,  label:'常連'   },
  { min:20,  label:'名物'   },
  { min:50,  label:'古参'   },
];

const MODE_LABELS = {
  normal: null,
  winner: '🎲 勝敗回',
  letterHijack: '🎲 お便り回',
  noConclusion: '🎲 まとまらない回',
  awkwardMoment: '🎲 ズレ回'
};

let userProfile = { name:'匿名リスナー', readCount:0 };
let djMemory = { a:[], b:[], c:[], d:[] };

function loadProfile() {
  try {
    const saved = localStorage.getItem('ai_radio_profile');
    if (saved) userProfile = JSON.parse(saved);
  } catch(e) {}
  updateProfileUI();
}

function loadUsedThemes() {
  try {
    const saved = localStorage.getItem('ai_radio_used_themes');
    if (saved) usedThemes = JSON.parse(saved);
  } catch(e) {}
}

function saveUsedThemes() {
  try { localStorage.setItem('ai_radio_used_themes', JSON.stringify(usedThemes)); } catch(e) {}
}

function loadDJMemory() {
  try {
    const saved = localStorage.getItem('ai_radio_dj_memory');
    if (saved) djMemory = JSON.parse(saved);
  } catch(e) {}
}

function saveDJMemoryToStorage() {
  try { localStorage.setItem('ai_radio_dj_memory', JSON.stringify(djMemory)); } catch(e) {}
}

function saveProfile() {
  try { localStorage.setItem('ai_radio_profile', JSON.stringify(userProfile)); } catch(e) {}
}

function getRank(count) {
  return [...RANKS].reverse().find(r => count >= r.min)?.label || '訪問者';
}

function updateProfileUI() {
  document.getElementById('profileName').textContent = userProfile.name;
  document.getElementById('profileRank').textContent = getRank(userProfile.readCount);
  document.getElementById('profileCount').textContent = userProfile.readCount + '回';
}

function incrementReadCount() {
  userProfile.readCount++;
  saveProfile();
  updateProfileUI();
}

let isRunning = false;
let usedThemes = [];
let pendingLetter = null;
let lastCmIdx = -1;
let lastBgmIdx = -1;
let audioCtx = null;
let bgmTimer = null;
let bgmOn = false;
let synth = window.speechSynthesis;
let voices = [];
let totalApiCost = 0;

function loadVoices() { voices = synth.getVoices().filter(v => v.lang.startsWith('ja')); }
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function loadKey() {
  try {
    if (localStorage.getItem('ai_radio_key')) {
      document.getElementById('keySavedBanner').style.display = 'flex';
      document.getElementById('keyInputArea').style.display = 'none';
    }
  } catch(e) {}
}
function clearKey() {
  try { localStorage.removeItem('ai_radio_key'); } catch(e) {}
  document.getElementById('keySavedBanner').style.display = 'none';
  document.getElementById('keyInputArea').style.display = 'block';
}
function getApiKey() {
  try { const s = localStorage.getItem('ai_radio_key'); if (s) return s; } catch(e) {}
  return document.getElementById('apiKey').value.trim();
}

function pickBgm() {
  let idx;
  do { idx = Math.floor(Math.random() * BGM_PATTERNS.length); } while (idx === lastBgmIdx);
  lastBgmIdx = idx;
  return BGM_PATTERNS[idx];
}

function bgmTick(pattern) {
  if (!bgmOn || !audioCtx) return;
  const now = audioCtx.currentTime;
  for (let i = 0; i < 8; i++) {
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = pattern.notes[Math.floor(Math.random() * pattern.notes.length)] * (Math.random() > 0.5 ? 1 : 0.5);
      osc.type = pattern.type;
      const s = now + i * pattern.interval, d = pattern.interval * 1.6;
      gain.gain.setValueAtTime(0, s);
      gain.gain.linearRampToValueAtTime(pattern.vol, s + 0.3);
      gain.gain.linearRampToValueAtTime(0, s + d);
      osc.start(s); osc.onended = () => osc.disconnect(); osc.stop(s + d);
    } catch(e) {}
  }
  bgmTimer = setTimeout(() => bgmTick(pattern), 8 * pattern.interval * 1000 - 300);
}

function startBGM() {
  if (bgmOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmOn = true; setBgmUI(true); bgmTick(pickBgm());
  } catch(e) {}
}

function stopBGM() {
  bgmOn = false; clearTimeout(bgmTimer); bgmTimer = null; setBgmUI(false);
}

function setBgmUI(on) {
  document.getElementById('bgmDot').classList.toggle('off', !on);
  document.getElementById('bgmLabel').textContent = on ? 'BGM 再生中' : 'BGM 停止中';
}

function pickCM() {
  let idx;
  do { idx = Math.floor(Math.random() * CM_LIST.length); } while (idx === lastCmIdx);
  lastCmIdx = idx;
  return CM_LIST[idx];
}

function containsKanji(text) {
  return /[一-龯々]/.test(text);
}

async function callAPI(prompt, maxTokens, model) {
  model = model || 'claude-sonnet-4-6';
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': getApiKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model, max_tokens:maxTokens, messages:[{ role:'user', content:prompt }] })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'APIエラー'); }
  const data = await res.json();

  const inTok = data.usage?.input_tokens || 0;
  const outTok = data.usage?.output_tokens || 0;
  const rate = model.includes('haiku') ? { in:1, out:5 } : { in:3, out:15 };
  const costJPY = (inTok * rate.in / 1000000 + outTok * rate.out / 1000000) * 160;
  totalApiCost += costJPY;
  console.log(`[${model.includes('haiku') ? 'Haiku' : 'Sonnet'}] in:${inTok} out:${outTok} cost:¥${costJPY.toFixed(2)} (累計:¥${totalApiCost.toFixed(1)})`);

  return data.content[0].text.trim();
}

function getNowContext() {
  const now = new Date();
  const month = now.getMonth() + 1;
  const hour = now.getHours();
  const season = month >= 3 && month <= 5 ? '春' : month >= 6 && month <= 8 ? '夏' : month >= 9 && month <= 11 ? '秋' : '冬';
  const timeOfDay = hour >= 5 && hour < 10 ? '朝' : hour >= 10 && hour < 17 ? '昼' : hour >= 17 && hour < 21 ? '夕方' : '夜';
  return `現在は${season}の${timeOfDay}（${hour}時台）`;
}

// DJペアを毎回ランダム選出（直近2回と同じ組み合わせを避ける）
const ALL_PAIRS = [['a','b'],['a','c'],['a','d'],['b','c'],['b','d'],['c','d']];
let recentPairs = [];
function pairKey(p) { return [...p].sort().join('-'); }

function pickDJs() {
  const candidates = ALL_PAIRS.filter(p =>
    !recentPairs.some(rp => pairKey(rp) === pairKey(p))
  );
  const pool = candidates.length > 0 ? candidates : ALL_PAIRS;
  const pair = pool[Math.floor(Math.random() * pool.length)];
  recentPairs.push(pair);
  if (recentPairs.length > 2) recentPairs.shift();
  return [...pair];
}

function getDJMemorySection(djKey) {
  const mem = djMemory[djKey];
  if (!mem || mem.length === 0) return '';
  const recent = mem.slice(-2).join('。');
  return `\n${DJS[djKey].name}の最近の出来事：${recent}`;
}

// 番組・テーマ・常連リスナーを毎回生成（Haiku1回）
async function generateShow(keyA, keyB) {
  const exclusion = usedThemes.length > 0
    ? '\n\n【使用済みなので絶対に除外】\n' + usedThemes.map((t, i) => `${i+1}. ${t}`).join('\n') : '';

  const raw = await callAPI(
    `あなたはラジオ番組のプロデューサーです。DJ「${DJS[keyA].name}」（${DJS[keyA].desc}）と「${DJS[keyB].name}」（${DJS[keyB].desc}）が出演する、今回限りの番組を企画してください。

このDJ2人の組み合わせに合った、面白い番組名と今日のテーマを考えてください。テーマは尖った企画でも構いません（例：「人生で一番無駄だった買い物選手権」「もし無人島にWi-Fiだけあったら」など）。

さらに、このテーマに合わせて、今日だけ登場する「今日のリスナー」のラジオネームと、そのキャラクターらしいお便りも1文で考えてください。${exclusion}

【出力形式のみ】
SHOW_NAME:番組名
THEME:テーマ
LISTENER_NAME:今日のリスナーのラジオネーム
LISTENER_LETTER:そのリスナーのお便り文`, 300, 'claude-haiku-4-5-20251001'
  );

  const showName = (raw.match(/SHOW_NAME:\s*(.+)/) || [,'AIラジオ'])[1].trim();
  const theme = (raw.match(/THEME:\s*(.+)/) || [,'今日のフリートーク'])[1].trim();
  const listenerName = (raw.match(/LISTENER_NAME:\s*(.+)/) || [,'今日のリスナー'])[1].trim();
  const listenerLetter = (raw.match(/LISTENER_LETTER:\s*(.+)/) || [,null])[1]?.trim() || null;

  usedThemes.push(theme);
  if (usedThemes.length > 20) usedThemes.shift();
  saveUsedThemes();

  return { showName, theme, listenerName, listenerLetter };
}

async function safeGenerateShow(keyA, keyB) {
  try { return await generateShow(keyA, keyB); }
  catch(e) {
    try { return await generateShow(keyA, keyB); }
    catch(e2) {
      return {
        showName: 'AIラジオ',
        theme: 'きょうのよもやま話',
        listenerName: 'しずかなりすなー',
        listenerLetter: null
      };
    }
  }
}

// お便り決定：ユーザー50% / 今日のリスナー100%フォールバック
async function decideLetter(theme, listenerName, listenerLetter) {
  if (pendingLetter) {
    const judge = await callAPI(
      `以下のお便りはラジオトークのテーマ「${theme}」に関連していますか？「yes」か「no」のみ答えてください。\nお便り：「${pendingLetter}」`, 10, 'claude-haiku-4-5-20251001'
    ).catch(() => 'no');
    if (judge.toLowerCase().includes('yes') && Math.random() < 0.5) {
      return { text: pendingLetter, name: userProfile.name, isUser: true };
    }
  }

  if (listenerLetter) return { text: listenerLetter, name: listenerName, isUser: false };
  return null;
}

async function fetchPart(partNum, showName, keyA, keyB, theme, letter, nextShowInfo, p2text, mode) {
  const nowCtx = getNowContext();
  const letterSection = letter
    ? `\n\n【リスナーからのお便り】\nラジオネーム「${letter.name}」さんからのお便りです。トークの途中で自然に読み上げて返答してください。\n「${letter.text}」` : '';

  const isPart3 = partNum === 3;
  const modeInstruction = (mode && mode !== 'normal') ? getModeInstruction(mode) : '';

  const memSectionA = getDJMemorySection(keyA);
  const memSectionB = getDJMemorySection(keyB);
  const memIntro = (memSectionA || memSectionB)
    ? `\n\n【DJの近況（オープニングで自然に触れる）】${memSectionA}${memSectionB}` : '';

  const instructions = {
    1: `【パート1：オープニング（約4分）】
- 番組名「${showName}」と出演DJを紹介する
- 時間帯や季節を自然に組み込む
- 今日のテーマ「${theme}」をさらっと紹介するだけにとどめる。テーマの深掘りはパート2で行うため、パート1では深く触れない
- リスナーにお便りを募集する${memIntro}`,

    2: `【パート2：メイントーク（約4分）】
- テーマ「${theme}」を深掘りしてトークする
- お便りがあれば自然な流れで紹介する${letterSection}`,

    3: `【パート3：まとめ・次回予告（約4分）】
- 今回の放送を振り返ってまとめる（以下の本編内容に基づいて）${p2text ? `\n【本編で話した内容】\n${p2text}` : ''}
- 次の番組「${nextShowInfo}」を予告する
- 自然な締めの言葉で終わる`
  };

  const memHistoryNote = (memSectionA || memSectionB)
    ? `
上記の【DJの近況】と同じ話題を3回以上繰り返さないこと（毎回少しでも違う角度・新しい出来事にすること）。` : '';

  const outputFormat = isPart3
    ? `【出力形式のみ】
SCRIPT:
A:セリフ
B:セリフ
...
A_EPISODE:DJ A（${DJS[keyA].name}）自身の現実の近況・経験を1文で（テーマが空想的・仮定的な内容で現実の出来事が語られなかった場合、または特に記憶に残すべき出来事がない場合は「なし」と出力する。既存の性格や価値観を強化・発展させる方向のみ、人格が変わるような変化は禁止。）
B_EPISODE:DJ B（${DJS[keyB].name}）自身の現実の近況・経験を1文で（同条件。A_EPISODEとB_EPISODEの両方が「なし」でも構わない。両方該当する場合は両方出力して良い。）${memHistoryNote}`
    : `【出力形式のみ】
A:セリフ
B:セリフ
...`;

  const buildPrompt = () => `あなたはラジオ番組「${showName}」の台本作家です。

DJ A「${DJS[keyA].name}」: ${DJS[keyA].desc}
【暴走条件】${DJS[keyA].trigger}

DJ B「${DJS[keyB].name}」: ${DJS[keyB].desc}
【暴走条件】${DJS[keyB].trigger}

時間帯：${nowCtx}

${instructions[partNum]}${modeInstruction}

【共通ルール】
- 12〜15回のやり取り（約4分分）
- 各セリフ1〜3文、キャラクターを活かした自然な会話
- 漢字は一切使わない。すべてひらがなで書くこと（例：「今日」→「きょう」「食べ物」→「たべもの」）
- AI・DJ・SNS・TVなどのアルファベット略語はそのまま使う
- 必ず最後のセリフは自然な区切りの言葉で終わること

【面白さ最優先ルール】
- 全体は「仲が良いからこそできるじゃれ合い」のトーン。本気のケンカではなく、気の合う相手にだけ見せる遠慮のないツッコミ合いにすること
- 毎回ではなくてもよいが、時々「え、でも」「それはちがくて」と軽く食い下がる場面を入れる
- 会話の中に1回は「……」や「あ、いや」「えーっと」など言葉につまる表現を混ぜてリアルな思考の時間を演出すること
- 相手の発言には適度にツッコむかあきれるが、最終的には笑いに変える
- 読点（、）や三点リーダー（…）を多用して音声読み上げ時に自然な間が生まれるようにすること
- お便りが届いたとき、DJのリアクションは共感や軽い驚きなど自然な範囲で構わない。毎回大げさに怒る必要はない

${outputFormat}`;

  let raw = await callAPI(buildPrompt(), isPart3 ? 3300 : 3000);

  function extractScript(text) {
    if (!isPart3) return text;
    const cutIdx = text.indexOf('A_EPISODE:');
    return (cutIdx >= 0 ? text.slice(0, cutIdx) : text).replace(/SCRIPT:\s*/, '');
  }

  // 漢字混入チェック：最大2回まで再生成を試みる
  for (let i = 0; i < 2 && containsKanji(raw); i++) {
    const retry = await callAPI(buildPrompt(), isPart3 ? 3300 : 3000).catch(() => null);
    if (retry) raw = retry;
    else break;
  }
  if (containsKanji(raw)) console.warn('漢字除去に失敗しました（2回再生成後も残存）');

  let scriptText = extractScript(raw);
  let episodes = [];

  if (isPart3) {
    const aMatch = raw.match(/A_EPISODE:\s*(.+)/);
    const bMatch = raw.match(/B_EPISODE:\s*(.+)/);
    const aEp = aMatch ? aMatch[1].trim() : null;
    const bEp = bMatch ? bMatch[1].trim() : null;
    if (aEp && aEp !== 'なし') episodes.push({ djKey:keyA, episode:aEp });
    if (bEp && bEp !== 'なし' && bEp !== aEp) episodes.push({ djKey:keyB, episode:bEp });
  }

  const lines = [];
  scriptText.split('\n').forEach(line => {
    const t = line.trim();
    if (t.startsWith('A:')) lines.push({ djKey:keyA, text:t.slice(2).trim() });
    else if (t.startsWith('B:')) lines.push({ djKey:keyB, text:t.slice(2).trim() });
  });

  return isPart3 ? { lines, episodes } : lines;
}

function saveDJEpisode(djKey, episode) {
  if (!djKey || !episode || episode === 'なし') return;
  if (djMemory[djKey].includes(episode)) return;
  djMemory[djKey].push(episode);
  if (djMemory[djKey].length > MAX_MEMORY) djMemory[djKey].shift();
  saveDJMemoryToStorage();
}

function saveDJEpisodes(episodes) {
  if (!episodes) return;
  episodes.forEach(e => saveDJEpisode(e.djKey, e.episode));
}

function pickEpisodeMode() {
  const roll = Math.random();
  if (roll < 0.70) return 'normal';
  if (roll < 0.82) return 'winner';
  if (roll < 0.92) return 'letterHijack';
  if (roll < 0.97) return 'noConclusion';
  return 'awkwardMoment';
}

function getModeInstruction(mode) {
  switch (mode) {
    case 'winner':
      return '\n\n【今回限りの特別演出：勝敗回】\nどちらか一方が最後まで自分の考えを曲げない。もう一方は途中から反論をやめて呆れる、または「もういいです」と諦める。誰かが押し切る・誰かが折れる、はっきりした勝敗をつけること。';
    case 'letterHijack':
      return '\n\n【今回限りの特別演出：お便り回】\nリスナーのお便りに対してDJの片方が異常に食いつき、当初のテーマから話が逸れて、お便りの話題だけで会話の大半を使ってしまう展開にすること。';
    case 'noConclusion':
      return '\n\n【今回限りの特別演出：まとまらない回】\n話を綺麗にまとめようとせず、結局結論が出ないまま「まあまた今度考えよう」のような形で終わること。';
    case 'awkwardMoment':
      return '\n\n【今回限りの特別演出：ズレ回】\n片方の発言に対してもう片方が本気で驚き、ズレた反応や全く想定外の返しをすることで、笑いになるすれ違いを生むこと。不快にならない範囲で、呆れるくらいのズレを演出すること。';
    default:
      return '';
  }
}

function speak(text, djKey) {
  return new Promise(resolve => {
    const dj = djKey ? DJS[djKey] : { pitch:1.0, rate:1.0 };
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP'; u.pitch = dj.pitch; u.rate = dj.rate;
    if (voices.length > 0) u.voice = voices[0];
    u.onend = resolve; u.onerror = resolve;
    synth.speak(u);
  });
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function showLoading(show) {
  document.getElementById('loadingIndicator').classList.toggle('visible', show);
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;

}

function showLetterBox(nextTheme) {

  document.getElementById('letterTheme').textContent = '📌 ' + nextTheme;
  document.getElementById('letterInput').value = '';

  document.getElementById('sendBtn').disabled = false;

}

function hideLetterBox() {

}

function sendLetter() {
  const text = document.getElementById('letterInput').value.trim();
  if (!text || text.length < 5) return;
  pendingLetter = text;

function setMode(mode, data) {
  const badge = document.getElementById('modeBadge');
  const bars = [...document.querySelectorAll('.bar')];
  bars.forEach(b => b.classList.remove('active','cm'));

    badge.className = 'mode-badge mode-talk';

}

async function speakLines(lines) {
  for (const line of lines) {
    if (!isRunning) return;
    await speak(line.text, line.djKey);
    await wait(180);
  }
}

async function playCM(keyA, keyB) {
  stopBGM();
  setMode('cm', {});
  const cm1 = pickCM();
  const cm2 = pickCM();
  await speak('それではCMです。', keyA);
  await wait(150);
  await speak(cm1, null);
  await wait(300);
  await speak(cm2, null);
  await wait(200);
  await speak('以上CMでした。', keyB);
  await wait(200);
}

async function safeFetch(fn) {
  try { return await fn(); }
  catch(e) {
    try { return await fn(); }
    catch(e2) { setStatus('エラー: ' + e2.message, true); stopRadio(); throw e2; }
  }
}

async function radioLoop() {
  setMode('loading', null);
  document.getElementById('currentTheme').textContent = 'まもなく放送開始...';
  showLoading(true);

  let curDJs = pickDJs();
  let nextDJs = pickDJs();

  let curShow = '', curTheme = '', curListenerName = '', curListenerLetter = null;
  let nextShow = '', nextTheme = '', nextListenerName = '', nextListenerLetter = null;

  const initPromise = (async () => {
    const [curG, nextG] = await Promise.all([
      safeGenerateShow(curDJs[0], curDJs[1]),
      safeGenerateShow(nextDJs[0], nextDJs[1])
    ]);
    curShow = curG.showName; curTheme = curG.theme;
    curListenerName = curG.listenerName; curListenerLetter = curG.listenerLetter;
    nextShow = nextG.showName; nextTheme = nextG.theme;
    nextListenerName = nextG.listenerName; nextListenerLetter = nextG.listenerLetter;
    return safeFetch(() => fetchPart(1, curShow, curDJs[0], curDJs[1], curTheme, null, null));
  })();

  await speak('AIラジオへようこそ。ただいま番組を準備中です。しばらくお待ちください。', null);
  let part1 = await initPromise;
  showLoading(false);

  showLetterBox(nextTheme);
  pendingLetter = null;

  while (isRunning) {
    const episodeMode = pickEpisodeMode();

    setMode('talk', { keyA: curDJs[0], keyB: curDJs[1], showName: curShow, theme: curTheme, episodeMode });
    startBGM();

    let curLetter = null;
    const part2Promise = (async () => {
      curLetter = await decideLetter(curTheme, curListenerName, curListenerLetter);
      return safeFetch(() => fetchPart(2, curShow, curDJs[0], curDJs[1], curTheme, curLetter, null, null, episodeMode));
    })();

    await speakLines(part1);
    if (!isRunning) return;

    await playCM(curDJs[0], curDJs[1]);
    if (!isRunning) return;
    const part2 = await safeFetch(() => part2Promise);

    setMode('talk', { keyA: curDJs[0], keyB: curDJs[1], showName: curShow, theme: curTheme, episodeMode });
    startBGM();

    const nextShowInfo = `${nextShow}（${DJS[nextDJs[0]].name}と${DJS[nextDJs[1]].name}）テーマ：${nextTheme}`;
    const p2text = part2.map(l => l.text).join('\n');
    const part3Promise = safeFetch(() => fetchPart(3, curShow, curDJs[0], curDJs[1], curTheme, null, nextShowInfo, p2text, episodeMode));

    await speakLines(part2);
    if (!isRunning) return;
    if (curLetter?.isUser) incrementReadCount();

    await playCM(curDJs[0], curDJs[1]);
    if (!isRunning) return;
    const part3Result = await part3Promise;

    setMode('talk', { keyA: curDJs[0], keyB: curDJs[1], showName: curShow, theme: curTheme, episodeMode });
    startBGM();

    const nextPart1Promise = safeFetch(() => fetchPart(1, nextShow, nextDJs[0], nextDJs[1], nextTheme, null, null));

    await speakLines(part3Result.lines);
    if (!isRunning) return;

    saveDJEpisodes(part3Result.episodes);

    await playCM(curDJs[0], curDJs[1]);
    if (!isRunning) return;

    const nextPart1 = await nextPart1Promise;

    hideLetterBox();

    curDJs = nextDJs;
    curShow = nextShow;
    curTheme = nextTheme;
    curListenerName = nextListenerName;
    curListenerLetter = nextListenerLetter;
    part1 = nextPart1;

    nextDJs = pickDJs();
    const nextG = await safeGenerateShow(nextDJs[0], nextDJs[1]);
    nextShow = nextG.showName;
    nextTheme = nextG.theme;
    nextListenerName = nextG.listenerName;
    nextListenerLetter = nextG.listenerLetter;
    showLetterBox(nextTheme);
    pendingLetter = null;
  }
}

async function startRadio() {
  const apiKey = getApiKey();
  if (!apiKey) { setStatus('APIキーを入力してください', true); return; }
  try {
    if (document.getElementById('saveKey')?.checked) {
      localStorage.setItem('ai_radio_key', apiKey);
      document.getElementById('keySavedBanner').style.display = 'flex';
      document.getElementById('keyInputArea').style.display = 'none';
    }
  } catch(e) {}
  userProfile.name = document.getElementById('radioName').value.trim() || '匿名リスナー';
  saveProfile();
  updateProfileUI();

  isRunning = true;
  recentPairs = [];
  document.getElementById('startBtn').disabled = true;
  document.getElementById('nowPlaying').classList.add('visible');
  await radioLoop();
}

function stopRadio() {
  isRunning = false;
  pendingLetter = null; recentPairs = [];
  synth.cancel(); stopBGM(); showLoading(false); hideLetterBox();
  if (audioCtx) { try { audioCtx.close(); } catch(e){} audioCtx = null; }
  document.getElementById('nowPlaying').classList.remove('visible');
  document.getElementById('startBtn').disabled = false;
  setStatus('放送を終了しました', false);
}

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible')
          try { await navigator.wakeLock.request('screen'); } catch(e) {}
      });
    }
  } catch(e) {}
}

loadKey();
loadProfile();
loadDJMemory();
loadUsedThemes();
requestWakeLock();
</script>
