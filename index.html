<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ラジオ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --bg:#0a0a0f;--surface:#13131a;--border:#2a2a3a;
    --accent:#ff4d6d;--accent2:#7b61ff;--text:#e8e8f0;--muted:#666680;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
  .header{text-align:center;margin-bottom:28px}
  .station-label{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:4px;
    color:var(--accent);text-transform:uppercase;margin-bottom:8px}
  h1{font-size:clamp(32px,8vw,52px);font-weight:900;letter-spacing:-1px}
  h1 span{color:var(--accent)}
  .tagline{color:var(--muted);font-size:13px;margin-top:6px}
  .version-tag{color:var(--muted);font-size:10px;margin-top:8px;font-family:'Share Tech Mono',monospace;opacity:.5}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:24px 20px;width:100%;max-width:480px;margin-bottom:16px}
  .sl{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;
    color:var(--muted);text-transform:uppercase;margin-bottom:8px}
  .ti{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;
    color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;
    padding:12px 14px;outline:none;transition:border-color .2s;-webkit-appearance:none;margin-bottom:16px}
  .ti:focus{border-color:var(--accent2)}
  #apiKey{font-family:'Share Tech Mono',monospace;letter-spacing:2px;margin-bottom:0}
  textarea.ti{resize:none;height:80px;line-height:1.6;margin-bottom:0}
  .key-saved{display:flex;align-items:center;justify-content:space-between;
    background:rgba(123,97,255,.1);border:1px solid rgba(123,97,255,.3);
    border-radius:10px;padding:10px 14px;font-size:13px;color:var(--accent2)}
  .key-saved button{background:transparent;border:none;color:var(--muted);
    cursor:pointer;font-size:12px;text-decoration:underline}
  .divider{border:none;border-top:1px solid var(--border);margin:18px 0}
  .btn-main{width:100%;border:none;border-radius:14px;color:#fff;cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:18px;font-weight:900;
    padding:20px;letter-spacing:2px;transition:all .2s;background:var(--accent)}
  .btn-main:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,77,109,.5)}
  .btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-stop{width:100%;background:transparent;border:1px solid var(--border);
    border-radius:14px;color:var(--muted);cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:700;
    padding:14px;margin-top:10px;transition:all .2s}
  .btn-stop:hover{border-color:var(--accent);color:var(--accent)}
  .now-playing{background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:24px 20px;width:100%;max-width:480px;
    margin-bottom:16px;display:none}
  .now-playing.visible{display:block}
  .waveform{display:flex;align-items:center;gap:3px;height:32px;margin-bottom:16px}
  .bar{width:3px;border-radius:2px;animation:wave 1s ease-in-out infinite;opacity:.3}
  .bar.active{opacity:1;background:var(--accent)}
  .bar.cm{background:#ffd700}
  @keyframes wave{0%,100%{height:4px}50%{height:24px}}
  .bar:nth-child(1){animation-delay:0s}.bar:nth-child(2){animation-delay:.1s}
  .bar:nth-child(3){animation-delay:.2s}.bar:nth-child(4){animation-delay:.3s}
  .bar:nth-child(5){animation-delay:.4s}.bar:nth-child(6){animation-delay:.3s}
  .bar:nth-child(7){animation-delay:.2s}.bar:nth-child(8){animation-delay:.1s}
  .bar:nth-child(9){animation-delay:0s}
  .mode-badge{display:inline-block;border-radius:20px;font-size:12px;font-weight:700;
    padding:4px 12px;margin-bottom:6px;letter-spacing:1px}
  .mode-talk{background:rgba(255,77,109,.2);color:var(--accent)}
  .mode-cm{background:rgba(255,215,0,.2);color:#ffd700}
  .mode-loading{background:rgba(123,97,255,.2);color:var(--accent2)}
  .show-name{font-size:13px;color:var(--muted);margin-bottom:10px;font-family:'Share Tech Mono',monospace}
  .current-theme{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--text)}
  .loading-indicator{display:none;align-items:center;justify-content:center;gap:10px;
    margin-bottom:16px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent2)}
  .loading-indicator.visible{display:flex}
  .loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent2);
    display:inline-block;margin:0 3px;animation:dotpulse 1.2s ease-in-out infinite;opacity:.3}
  .loading-dots span:nth-child(2){animation-delay:.4s}
  .loading-dots span:nth-child(3){animation-delay:.8s}
  @keyframes dotpulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
  .letter-box{background:rgba(123,97,255,.07);border:1px solid rgba(123,97,255,.3);
    border-radius:14px;padding:16px;margin-bottom:16px;display:none}
  .letter-box.visible{display:block}
  .letter-title{font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:10px;
    font-family:'Share Tech Mono',monospace;letter-spacing:2px}
  .letter-theme{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;
    padding:10px 12px;background:rgba(123,97,255,.1);border-radius:8px}
  .letter-sent{text-align:center;color:var(--accent2);font-size:13px;padding:8px 0;display:none}
  .btn-send{width:100%;border:none;border-radius:10px;color:#fff;cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:700;
    padding:12px;margin-top:8px;transition:all .2s;background:var(--accent2)}
  .btn-send:hover:not(:disabled){opacity:.85}
  .btn-send:disabled{opacity:.4;cursor:not-allowed}
  .bgm-indicator{display:flex;align-items:center;gap:8px;
    font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-top:12px}
  .bgm-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 1.5s ease-in-out infinite}
  .bgm-dot.off{background:var(--muted);animation:none;opacity:.3}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .status{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);
    text-align:center;margin-top:10px;min-height:16px}
  .status.error{color:var(--accent)}
  .profile-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:20px;width:100%;max-width:480px;margin-bottom:16px}
  .profile-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .profile-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted)}
  .profile-value{font-size:14px;font-weight:700;color:var(--text)}
  .profile-rank{font-size:18px;font-weight:900;color:var(--accent2)}
</style>
</head>
<body>

<div class="header">
  <div class="station-label">📻 on air</div>
  <h1>AI<span>Radio</span></h1>
  <div class="tagline">エンドレスラジオ — 止まるまで流れ続ける</div>
  <div class="version-tag">v1.6.1 - 2026.06.16</div>
</div>

<div class="profile-box">
  <div class="profile-row">
    <span class="profile-label">🎙️ ラジオネーム</span>
    <span class="profile-value" id="profileName">匿名リスナー</span>
  </div>
  <div class="profile-row">
    <span class="profile-label">⭐ 称号</span>
    <span class="profile-rank" id="profileRank">訪問者</span>
  </div>
  <div class="profile-row">
    <span class="profile-label">📬 採用回数</span>
    <span class="profile-value" id="profileCount">0回</span>
  </div>
</div>

<div class="card">
  <div class="sl">🔑 API キー</div>
  <div id="keySavedBanner" class="key-saved" style="display:none">
    <span>✅ APIキー保存済み</span>
    <button onclick="clearKey()">削除して再入力</button>
  </div>
  <div id="keyInputArea">
    <input type="password" id="apiKey" class="ti" placeholder="sk-ant-api..." autocomplete="off">
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
      <input type="checkbox" id="saveKey" checked style="width:auto;padding:0;accent-color:var(--accent2)">
      <label for="saveKey" style="font-size:12px;color:var(--muted);cursor:pointer">このデバイスに保存する</label>
    </div>
  </div>
  <hr class="divider">
  <div class="sl">🎙️ ラジオネーム</div>
  <input type="text" id="radioName" class="ti" placeholder="ラジオネームを入力..." maxlength="20" value="匿名リスナー">
  <button class="btn-main" id="startBtn" onclick="startRadio()">▶ 放送開始</button>
  <div class="status" id="status"></div>
</div>

<div class="now-playing" id="nowPlaying">
  <div class="sl">📡 オンエア中</div>
  <div class="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <div class="mode-badge mode-loading" id="modeBadge">⏳ 準備中</div>
  <div class="show-name" id="showName"></div>
  <div class="current-theme" id="currentTheme"></div>
  <div class="loading-indicator" id="loadingIndicator">
    <span>台本生成中</span>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
  <div class="letter-box" id="letterBox">
    <div class="letter-title" id="letterTitle">📬 次の番組へのお便り</div>
    <div class="letter-theme" id="letterTheme"></div>
    <textarea id="letterInput" class="ti" placeholder="お便りを送る..."></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendLetter()">送信する</button>
    <div class="letter-sent" id="letterSent">✅ お便りを受け付けました！</div>
  </div>
  <div class="bgm-indicator">
    <div class="bgm-dot off" id="bgmDot"></div>
    <span id="bgmLabel">BGM 停止中</span>
  </div>
  <button class="btn-stop" onclick="stopRadio()">■ 放送終了</button>
</div>

<script>

function pickBgm() {
  let idx;
  do { idx = Math.floor(Math.random() * BGM_PATTERNS.length); } while (idx === lastBgmIdx);
  lastBgmIdx = idx;
  return BGM_PATTERNS[idx];
}

function bgmTick(pattern) {
  if (!bgmOn || !audioCtx) return;
  const now = audioCtx.currentTime;
  for (let i = 0; i < 8; i++) {
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = pattern.notes[Math.floor(Math.random() * pattern.notes.length)] * (Math.random() > 0.5 ? 1 : 0.5);
      osc.type = pattern.type;
      const s = now + i * pattern.interval, d = pattern.interval * 1.6;
      gain.gain.setValueAtTime(0, s);
      gain.gain.linearRampToValueAtTime(pattern.vol, s + 0.3);
      gain.gain.linearRampToValueAtTime(0, s + d);
      osc.start(s); osc.onended = () => osc.disconnect(); osc.stop(s + d);
    } catch(e) {}
  }
  bgmTimer = setTimeout(() => bgmTick(pattern), 8 * pattern.interval * 1000 - 300);
}

function startBGM() {
  if (bgmOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmOn = true; setBgmUI(true); bgmTick(pickBgm());
  } catch(e) {}
}

function stopBGM() {
  bgmOn = false; clearTimeout(bgmTimer); bgmTimer = null; setBgmUI(false);
}

function setBgmUI(on) {
  document.getElementById('bgmDot').classList.toggle('off', !on);

}

async function callAPI(prompt, maxTokens) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': getApiKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:maxTokens, messages:[{ role:'user', content:prompt }] })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'APIエラー'); }
  return (await res.json()).content[0].text.trim();
}

function getNowContext() {
  const now = new Date();
  const month = now.getMonth() + 1;
  const hour = now.getHours();
  const season = month >= 3 && month <= 5 ? '春' : month >= 6 && month <= 8 ? '夏' : month >= 9 && month <= 11 ? '秋' : '冬';
  const timeOfDay = hour >= 5 && hour < 10 ? '朝' : hour >= 10 && hour < 17 ? '昼' : hour >= 17 && hour < 21 ? '夕方' : '夜';
  return `現在は${season}の${timeOfDay}（${hour}時台）`;
}

function nextSchedule() {
  const s = SCHEDULE[scheduleIdx % SCHEDULE.length];
  scheduleIdx++;
  return { ...s, show: SHOWS[s.key] };
}

async function fetchTheme(show) {
  const exclusion = usedThemes.length > 0
    ? '\n\n【使用済みなので絶対に除外】\n' + usedThemes.map((t, i) => `${i+1}. ${t}`).join('\n') : '';
  let base;
  if (show?.genres?.length) {
    const genre = show.genres[Math.floor(Math.random() * show.genres.length)];
    base = `あなたはラジオ番組のプロデューサーです。「${genre}」に関連する面白いラジオトークのテーマを1つ考えてください。`;
  } else {
    let idx;
    do { idx = Math.floor(Math.random() * THEME_GENRES.length); } while (idx === lastGenreIdx);
    lastGenreIdx = idx;
    base = `あなたはラジオ番組のプロデューサーです。「${THEME_GENRES[idx]}」に関連する面白いラジオトークのテーマを1つ考えてください。`;
  }
  const theme = await callAPI(base + 'テーマの文章のみ出力（例：○○について）。説明不要。' + exclusion, 100);
  usedThemes.push(theme);
  if (usedThemes.length > 10) usedThemes.shift();
  return theme;
}

async function decideLetter(theme, keyA, keyB) {
  const key = [keyA,keyB].sort().join('');
  const show = SHOWS[key];
  const roll = Math.random();

  if (pendingLetter && roll < 0.5) {
    const judge = await callAPI(
      `以下のお便りはラジオトークのテーマ「${theme}」に関連していますか？「yes」か「no」のみ答えてください。\nお便り：「${pendingLetter}」`, 10
    ).catch(() => 'no');
    if (judge.toLowerCase().includes('yes')) {
      incrementReadCount();
      return { text: pendingLetter, name: userProfile.name };
    }
  }

  if (roll < 0.8) {
    const prompt = `ラジオ番組「${show.name}」の常連リスナー「${show.regular.name}」（${show.regular.desc}）が「${theme}」というテーマにお便りを1文で送りました。そのキャラクターらしく、少しクセのある・ツッコミたくなる内容にしてください。お便り文のみ出力。`;
    const text = await callAPI(prompt, 150).catch(() => null);
    if (text) return { text, name: show.regular.name };
  }

  const fakeName = FAKE_NAMES[Math.floor(Math.random() * FAKE_NAMES.length)];
  const text = await callAPI(
    `ラジオ番組のリスナー「${fakeName}」が「${theme}」というテーマにお便りを1文で送りました。少し極端な意見や偏見、または思わずツッコみたくなる内容にしてください。自然な話し言葉で。お便りの文章のみ出力。`, 150
  ).catch(() => 'たのしく聴いています');
  return { text, name: fakeName };
}

  const instructions = {

- リスナーにお便りを募集する${mem ? `\n- 前回の放送内容とお便りを自然な流れで紹介する${reviewSection}` : ''}`,

    2: `【パート2：メイントーク（約4分）】
- テーマ「${theme}」を深掘りしてトークする

- 次の番組「${nextShowInfo}」を予告する

  };

  const raw = await callAPI(

DJ A「${DJS[keyA].name}」: ${DJS[keyA].desc}
DJ B「${DJS[keyB].name}」: ${DJS[keyB].desc}

- 12〜15回のやり取り（約4分分）
- 各セリフ1〜3文、キャラクターを活かした自然な会話

- 会話の中に1回は「……」や「あ、いや」「えーっと」など言葉につまる表現を混ぜてリアルな思考の時間を演出すること

function speak(text, djKey) {
  return new Promise(resolve => {
    const dj = djKey ? DJS[djKey] : { pitch:1.0, rate:1.0 };
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP'; u.pitch = dj.pitch; u.rate = dj.rate;
    if (voices.length > 0) u.voice = voices[0];
    u.onend = resolve; u.onerror = resolve;
    synth.speak(u);
  });
}

async function speakLines(lines) {
  for (const line of lines) {
    if (!isRunning) return;
    await speak(line.text, line.djKey);
    await wait(180);
  }
}

async function playCM(keyA, keyB) {
  stopBGM();
  setMode('cm', {});
  const cm1 = pickCM();
  const cm2 = pickCM();
  await speak('それではCMです。', keyA);
  await wait(150);
  await speak(cm1, null);
  await wait(300);
  await speak(cm2, null);
  await wait(200);
  await speak('以上CMでした。', keyB);
  await wait(200);
}

async function safeFetch(fn) {
  try { return await fn(); }
  catch(e) {
    try { return await fn(); }
    catch(e2) { setStatus('エラー: ' + e2.message, true); stopRadio(); throw e2; }
  }
}

async function radioLoop() {
  setMode('loading', null);
  document.getElementById('currentTheme').textContent = 'まもなく放送開始...';
  showLoading(true);

  let cur = nextSchedule();
  let next = nextSchedule();
  let curTheme = '';
  let nextTheme = '';

  const initPromise = (async () => {
    [curTheme, nextTheme] = await Promise.all([
      fetchTheme(cur.show),
      fetchTheme(next.show)
    ]);
    return safeFetch(() => fetchPart(1, cur.show, cur.keyA, cur.keyB, curTheme, null, null));
  })();

  await speak('AIラジオへようこそ。ただいま番組を準備中です。しばらくお待ちください。', null);
  let part1 = await initPromise;
  showLoading(false);

  showLetterBox(nextTheme);
  pendingLetter = null;

  while (isRunning) {
    setMode('talk', { keyA: cur.keyA, keyB: cur.keyB, show: cur.show, theme: curTheme });
    startBGM();

    let curLetter = null;
    const part2Promise = (async () => {
      curLetter = await decideLetter(curTheme, cur.keyA, cur.keyB);
      return safeFetch(() => fetchPart(2, cur.show, cur.keyA, cur.keyB, curTheme, curLetter, null));
    })();

    await speakLines(part1);
    if (!isRunning) return;

    await playCM(cur.keyA, cur.keyB);
    if (!isRunning) return;
    const part2 = await safeFetch(() => part2Promise);

    setMode('talk', { keyA: cur.keyA, keyB: cur.keyB, show: cur.show, theme: curTheme });
    startBGM();

    const nextShowInfo = `${next.show.name}（${DJS[next.keyA].name}と${DJS[next.keyB].name}）テーマ：${nextTheme}`;
    const p2text = part2.map(l => l.text).join('\n');
    const part3Promise = safeFetch(() => fetchPart(3, cur.show, cur.keyA, cur.keyB, curTheme, null, nextShowInfo, p2text));

    await speakLines(part2);
    if (!isRunning) return;

    await playCM(cur.keyA, cur.keyB);
    if (!isRunning) return;
    const part3 = await part3Promise;

    setMode('talk', { keyA: cur.keyA, keyB: cur.keyB, show: cur.show, theme: curTheme });
    startBGM();

    const memKey = [cur.keyA, cur.keyB].sort().join('');
    const transcript = [...part1, ...part2].map(l => l.text).join('\n');
    const nextPart1Promise = safeFetch(() => fetchPart(1, next.show, next.keyA, next.keyB, nextTheme, null, null));
    const memPromise = callAPI(
      `以下はラジオ番組「${cur.show.name}」（テーマ：${curTheme}）の台本です。\n${transcript}\n\nこの放送で話されたエピソードや印象的な話題を2〜3文で要約してください。要約のみ出力。`, 200
    ).catch(() => null).then(episode => {
      if (episode) showMemory[memKey] = { theme: curTheme, episode, listenerName: curLetter?.name || null, listenerText: curLetter?.text || null };
    });

    await speakLines(part3);
    if (!isRunning) return;
    await memPromise;

    await playCM(cur.keyA, cur.keyB);
    if (!isRunning) return;

    const nextPart1 = await nextPart1Promise;

    hideLetterBox();

    cur = next;
    curTheme = nextTheme;
    part1 = nextPart1;

    next = nextSchedule();
    nextTheme = await fetchTheme(next.show).catch(() => fetchTheme(null));
    showLetterBox(nextTheme);
    pendingLetter = null;
  }
}

async function startRadio() {
  const apiKey = getApiKey();
  if (!apiKey) { setStatus('APIキーを入力してください', true); return; }
  try {
    if (document.getElementById('saveKey')?.checked) {
      localStorage.setItem('ai_radio_key', apiKey);
      document.getElementById('keySavedBanner').style.display = 'flex';
      document.getElementById('keyInputArea').style.display = 'none';
    }
  } catch(e) {}
  userProfile.name = document.getElementById('radioName').value.trim() || '匿名リスナー';
  saveProfile();
  updateProfileUI();

  Object.keys(INITIAL_MEMORIES).forEach(key => {
    const patterns = INITIAL_MEMORIES[key];
    showMemory[key] = patterns[Math.floor(Math.random() * patterns.length)];
  });

  isRunning = true;
  scheduleIdx = 0;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('nowPlaying').classList.add('visible');
  await radioLoop();
}

function stopRadio() {
  isRunning = false;
  usedThemes = []; pendingLetter = null; scheduleIdx = 0;
  Object.keys(showMemory).forEach(k => delete showMemory[k]);
  synth.cancel(); stopBGM(); showLoading(false); hideLetterBox();
  if (audioCtx) { try { audioCtx.close(); } catch(e){} audioCtx = null; }
  document.getElementById('nowPlaying').classList.remove('visible');
  document.getElementById('startBtn').disabled = false;
  setStatus('放送を終了しました', false);
}

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible')
          try { await navigator.wakeLock.request('screen'); } catch(e) {}
      });
    }
  } catch(e) {}
}

loadKey();
loadProfile();
requestWakeLock();
</script>
